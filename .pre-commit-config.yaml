---
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-yaml
  - id: check-toml
  - id: check-added-large-files
    args: [--maxkb=5000]
  - id: debug-statements
    language_version: python3
- repo: local
  hooks:
  - id: uv-lock-check
    name: uv lock check
    entry: uv --project website/backend lock --check
    language: system
    pass_filenames: false
    files: ^website/backend/(pyproject\.toml|uv\.lock|uv\.toml)$
  - id: ruff-check
    name: ruff check
    entry: uv --project website/backend run ruff check --no-cache --config website/backend/pyproject.toml
    language: system
    types_or: [python, pyi]
